<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沫兮万能解析 - 视频在线解析</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
        color: #333;
    }
    .container {
        max-width: 900px;
        margin: 0 auto;
    }
    .header {
        text-align: center;
        color: #fff;
        margin-bottom: 40px;
    }
    .header h1 { font-size: 32px; margin-bottom: 10px; }
    .header p { font-size: 15px; opacity: 0.9; }
    .card {
        background: #fff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        margin-bottom: 20px;
    }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #667eea; }
    button {
        padding: 14px 28px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .quick-links button {
        padding: 6px 14px;
        background: #f0f0f0;
        color: #555;
        font-size: 13px;
        border-radius: 20px;
    }
    .quick-links button:hover { background: #e0e0e0; box-shadow: none; }
    .result { margin-top: 20px; }
    .result-item {
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
        margin-bottom: 10px;
        word-break: break-all;
    }
    .result-item.success { background: #e8f5e9; border-left: 4px solid #4caf50; }
    .result-item.error { background: #ffebee; border-left: 4px solid #f44336; }
    .result-item.loading { background: #e3f2fd; border-left: 4px solid #2196f3; }
    /* 广告分析信息 */
    .ad-info {
        margin-top: 12px;
        padding: 12px 14px;
        background: linear-gradient(135deg, #fff3e0, #fff8e1);
        border-radius: 8px;
        border: 1px solid #ffe0b2;
        font-size: 13px;
    }
    .ad-info-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .ad-info-title { font-weight: 600; color: #e65100; font-size: 13px; }
    .ad-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
    }
    .ad-badge.clean { background: #c8e6c9; color: #2e7d32; }
    .ad-badge.partial { background: #fff9c4; color: #f57f17; }
    .ad-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .ad-stat { color: #555; }
    .ad-stat strong { color: #e65100; font-weight: 600; }
    .ad-stat span { font-size: 12px; color: #888; }
    .rules-toggle {
        font-size: 12px;
        color: #e65100;
        cursor: pointer;
        user-select: none;
        padding: 4px 10px;
        background: #fff3e0;
        border-radius: 4px;
        border: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .rules-toggle:hover { background: #ffe0b2; }
    .rules-panel {
        display: none;
        margin-top: 10px;
        padding: 10px;
        background: #fff;
        border-radius: 6px;
        border: 1px solid #eee;
        font-size: 12px;
    }
    .rules-panel.open { display: block; }
    .rules-panel h4 { font-size: 12px; color: #888; margin-bottom: 6px; margin-top: 8px; }
    .rules-panel h4:first-child { margin-top: 0; }
    .rule-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .rule-tag {
        padding: 2px 8px;
        background: #ffebee;
        color: #c62828;
        border-radius: 4px;
        font-size: 11px;
        font-family: monospace;
    }
    .rule-tag.safe {
        background: #e8f5e9;
        color: #2e7d32;
    }
    .result-label { font-size: 12px; color: #666; margin-bottom: 5px; }
    .result-url { font-family: monospace; font-size: 13px; color: #333; }
    .result-actions { margin-top: 10px; display: flex; gap: 8px; }
    .result-actions button {
        padding: 6px 14px;
        background: #fff;
        color: #667eea;
        border: 1px solid #667eea;
        font-size: 12px;
        border-radius: 6px;
    }
    .result-actions button:hover { background: #667eea; color: #fff; }
    .nav-links { margin-top: 30px; text-align: center; color: #fff; font-size: 14px; }
    .nav-links a { color: #fff; margin: 0 10px; text-decoration: none; opacity: 0.85; }
    .nav-links a:hover { opacity: 1; text-decoration: underline; }
    .footer { text-align: center; color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 40px; }
    pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 沫兮万能解析</h1>
        <p>多线路视频在线解析 · 智能选优 · M3U8 直链</p>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="粘贴视频链接（腾讯视频、爱奇艺、抖音...）或 M3U8 直链">
            <button id="parseBtn" onclick="parseVideo()">🔍 解析</button>
        </div>
        <div class="quick-links">
            <span style="color:#888;font-size:13px;line-height:28px;">快速填写：</span>
            <button onclick="fillDemo('https://v.qq.com/x/cover/mzc00200mp8vo9l/r00421m6n7k.html')">腾讯视频示例</button>
            <button onclick="fillDemo('https://www.iqiyi.com/v_example.html')">爱奇艺示例</button>
            <button onclick="fillDemo('https://v.douyin.com/demo/')">抖音示例</button>
            <button onclick="fillDemo('')">清空</button>
        </div>
        <div id="result" class="result"></div>
    </div>

    <div class="nav-links">
        <a href="player.html">▶️ 播放器</a>
        <a href="api-test.html">🧪 API 调试</a>
        <a href="m3u8-test.html">📺 M3U8 测试</a>
    </div>

    <div class="footer">
        © MX 射手沫蝴蝶 · 仅供学习交流使用
    </div>
</div>

<script>
const API_URL = '../index.php';
const NOAD_API = '../noad_proxy.php?mode=api';
const RULES_API = '../noad_proxy.php?mode=rules';
let cachedRules = null;

function fillDemo(url) {
    document.getElementById('videoUrl').value = url;
}

// 加载去广告规则（缓存）
function loadAdRules() {
    if (cachedRules) return Promise.resolve(cachedRules);
    return fetch(RULES_API)
        .then(r => r.json())
        .then(data => { cachedRules = data; return data; })
        .catch(() => null);
}

// 格式化规则列表为标签
function renderRuleTags(keywords, isSafe) {
    return keywords.map(k =>
        `<span class="rule-tag${isSafe ? ' safe' : ''}">${k}</span>`
    ).join('');
}

// 渲染广告分析信息面板
function renderAdInfo(data, rules) {
    const total = data.total_segments || 0;
    const removed = data.ad_removed || 0;
    const kept = total - removed;
    const badge = removed > 0
        ? `<span class="ad-badge partial">🚫 去广告 ${removed} 个片段</span>`
        : `<span class="ad-badge clean">✅ 无广告片段</span>`;

    let rulesHtml = '';
    if (rules) {
        rulesHtml = `
            <div class="rules-panel" id="rulesPanel">
                <h4>🚫 广告识别关键词（命中则过滤）</h4>
                <div class="rule-tags">${renderRuleTags((rules.ad_keywords || []).slice(0, 30), false)}</div>
                ${(rules.ad_keywords || []).length > 30 ? `<span style="color:#999;font-size:11px;">... 等共 ${rules.ad_keywords.length} 个关键词</span>` : ''}
                <h4>✅ 白名单关键词（无论是否命中广告规则都会被保留）</h4>
                <div class="rule-tags">${renderRuleTags((rules.whitelist_keywords || []).slice(0, 30), true)}</div>
                ${(rules.whitelist_keywords || []).length > 30 ? `<span style="color:#999;font-size:11px;">... 等共 ${rules.whitelist_keywords.length} 个白名单词</span>` : ''}
            </div>`;
    }

    return `
        <div class="ad-info">
            <div class="ad-info-header">
                <span class="ad-info-title">📊 广告片段分析</span>
                ${badge}
            </div>
            <div class="ad-stats">
                <div class="ad-stat">总片段: <strong>${total}</strong> <span>个</span></div>
                <div class="ad-stat">去广告: <strong>${removed}</strong> <span>个</span></div>
                <div class="ad-stat">保留: <strong>${kept}</strong> <span>个</span></div>
                <div class="ad-stat">来源: <strong>${data.from_source || '—'}</strong></div>
                ${data.response_time ? `<div class="ad-stat">耗时: <strong>${data.response_time}ms</strong></div>` : ''}
                ${data.from_cache ? `<div class="ad-stat"><span style="background:#e3f2fd;padding:1px 6px;border-radius:4px;color:#1565c0;">📦 缓存</span></div>` : ''}
            </div>
            ${rulesHtml ? `
            <button class="rules-toggle" onclick="toggleRules()">
                📋 查看去广告规则详情 ${rules ? `(${rules.ad_keywords.length} 广告词 + ${rules.whitelist_keywords.length} 白名单)` : ''}
                <span id="rulesArrow">▼</span>
            </button>` : ''}
        </div>
    `;
}

function toggleRules() {
    const panel = document.getElementById('rulesPanel');
    const arrow = document.getElementById('rulesArrow');
    if (panel) {
        panel.classList.toggle('open');
        if (arrow) arrow.textContent = panel.classList.contains('open') ? '▲' : '▼';
    }
}

function parseVideo() {
    const url = document.getElementById('videoUrl').value.trim();
    const resultEl = document.getElementById('result');
    const btn = document.getElementById('parseBtn');

    if (!url) {
        resultEl.innerHTML = '<div class="result-item error"><div class="result-label">⚠️ 错误</div><div class="result-url">请输入视频链接</div></div>';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 解析中...';
    resultEl.innerHTML = '<div class="result-item loading"><div class="result-label">🔄 请求中</div><div class="result-url">正在通过多线路解析，请稍候...</div></div>';

    const startTime = Date.now();

    fetch(`${NOAD_API}&url=${encodeURIComponent(url)}`)
        .then(r => r.text())
        .then(text => {
            let data;
            try { data = JSON.parse(text); } catch(e) { data = { msg: text, code: 200 }; }
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);

            if (data && (data.code === 200 || data.msg)) {
                const playUrl = data.url || data.msg || '';
                const isM3u8 = playUrl.includes('.m3u8') || playUrl.includes('m3u8');

                // 加载规则并渲染完整结果
                loadAdRules().then(rules => {
                    const adInfo = (data.total_segments !== undefined || data.ad_removed !== undefined)
                        ? renderAdInfo(data, rules)
                        : '';

                    resultEl.innerHTML = `
                        <div class="result-item success">
                            <div class="result-label">✅ 解析成功 · 耗时 ${elapsed}s ${data.strategy ? '· ' + data.strategy : ''}</div>
                            <div class="result-url">${playUrl}</div>
                            <div class="result-actions">
                                ${isM3u8 ? `<button onclick="playInPlayer('${playUrl}')">▶️ 播放</button>` : ''}
                                <button onclick="copyText('${playUrl}')">📋 复制</button>
                                <button onclick="window.open('${playUrl}', '_blank')">🔗 新窗口</button>
                            </div>
                            ${adInfo}
                        </div>
                    `;
                });
            } else {
                // 后端解析失败，降级到 index.php
                resultEl.innerHTML = '<div class="result-item loading"><div class="result-label">🔄 后端解析失败，尝试备用解析...</div></div>';
                fetch(`${API_URL}?url=${encodeURIComponent(url)}`)
                    .then(r => r.text())
                    .then(text2 => {
                        let data2;
                        try { data2 = JSON.parse(text2); } catch(e) { data2 = { msg: text2, code: 200 }; }
                        const playUrl2 = data2.url || data2.msg || '';
                        const isM3u8 = playUrl2.includes('.m3u8') || playUrl2.includes('m3u8');
                        if (data2.code === 200 || data2.msg) {
                            resultEl.innerHTML = `
                                <div class="result-item success">
                                    <div class="result-label">✅ 解析成功（备用） · 耗时 ${((Date.now()-startTime)/1000).toFixed(2)}s</div>
                                    <div class="result-url">${playUrl2}</div>
                                    <div class="result-actions">
                                        ${isM3u8 ? `<button onclick="playInPlayer('${playUrl2}')">▶️ 播放</button>` : ''}
                                        <button onclick="copyText('${playUrl2}')">📋 复制</button>
                                        <button onclick="window.open('${playUrl2}', '_blank')">🔗 新窗口</button>
                                    </div>
                                </div>`;
                        } else {
                            resultEl.innerHTML = `<div class="result-item error"><div class="result-label">❌ 所有解析均失败</div><pre>${(data2.msg || text2).slice(0, 500)}</pre></div>`;
                        }
                    });
            }
        })
        .catch(err => {
            resultEl.innerHTML = `<div class="result-item error"><div class="result-label">❌ 请求失败</div><div class="result-url">${err.message}</div></div>`;
        })
        .finally(() => {
            btn.disabled = false;
            btn.textContent = '🔍 解析';
        });
}

function playInPlayer(url) {
    window.location.href = `player.html?src=${encodeURIComponent(url)}`;
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✅ 已复制';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}

document.getElementById('videoUrl').addEventListener('keypress', e => {
    if (e.key === 'Enter') parseVideo();
});
</script>
</body>
</html>
